<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Адмін-панель — Tun-Tun-Tun Sahur</title>
<meta name="robots" content="noindex, nofollow" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --ink: #16151a;
    --ink-2: #1e1d24;
    --text: #f3efe7;
    --text-soft: #9a97a3;
    --copper: #b87a4a;
    --copper-light: #d59a6a;
    --line: rgba(243,239,231,0.12);
    --success: #6fbf8f;
    --danger: #e08a7e;
    --font-display: "Fraunces", Georgia, serif;
    --font-body: "Inter", -apple-system, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--ink);
    color: var(--text);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 1000px; margin: 0 auto; padding: 40px 24px 80px; }

  h1, h2 { font-family: var(--font-display); font-weight: 600; margin: 0; }
  .mono { font-family: var(--font-mono); }

  /* ---------- login screen ---------- */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-card {
    width: 100%;
    max-width: 380px;
    background: var(--ink-2);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 36px;
  }
  .login-card h1 { font-size: 24px; margin-bottom: 6px; }
  .login-card p.sub { color: var(--text-soft); font-size: 14px; margin-bottom: 24px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-family: var(--font-mono); font-size: 12px; color: var(--text-soft); margin-bottom: 7px; }
  .field input {
    width: 100%; padding: 12px 14px; border-radius: 10px;
    border: 1.5px solid var(--line); background: rgba(243,239,231,0.03);
    color: var(--text); font-family: var(--font-body); font-size: 15px;
  }
  .field input:focus { outline: none; border-color: var(--copper); }
  .btn {
    width: 100%; padding: 13px 0; border-radius: 980px; border: none;
    background: var(--copper); color: var(--ink); font-weight: 600; font-size: 14px;
    cursor: pointer; transition: background .2s ease;
  }
  .btn:hover { background: var(--copper-light); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-msg { font-size: 13.5px; margin-top: 14px; text-align: center; color: var(--danger); min-height: 16px; }

  /* ---------- dashboard ---------- */
  .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
  .dash-header h1 { font-size: 26px; }
  .logout-btn {
    background: rgba(243,239,231,0.06); border: 1px solid var(--line); color: var(--text);
    padding: 9px 18px; border-radius: 980px; font-size: 13px; cursor: pointer; font-family: var(--font-body);
  }
  .logout-btn:hover { border-color: var(--copper); }

  .filters { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-btn {
    padding: 9px 16px; border-radius: 980px; border: 1px solid var(--line);
    background: rgba(243,239,231,0.03); color: var(--text-soft); font-size: 13px;
    cursor: pointer; font-family: var(--font-body); transition: border-color .2s ease, color .2s ease;
  }
  .filter-btn.active { border-color: var(--copper); color: var(--copper-light); background: rgba(184,122,74,0.1); }

  .empty-note { color: var(--text-soft); padding: 40px 0; text-align: center; }

  .booking-list { display: flex; flex-direction: column; gap: 10px; }
  .booking-row {
    display: grid;
    grid-template-columns: 90px 1fr auto;
    gap: 16px;
    align-items: center;
    background: var(--ink-2);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px 18px;
  }
  .booking-row.status-came { border-color: rgba(111,191,143,0.4); }
  .booking-row.status-no_show { border-color: rgba(224,138,126,0.4); opacity: 0.7; }
  .booking-row.status-cancelled { opacity: 0.4; }

  .b-time { font-family: var(--font-mono); font-size: 16px; text-align: center; }
  .b-time .date { display: block; font-size: 11px; color: var(--text-soft); margin-top: 2px; }

  .b-info .name { font-weight: 600; font-size: 15px; }
  .b-info .meta { font-size: 13px; color: var(--text-soft); margin-top: 3px; }
  .b-info .phone { font-family: var(--font-mono); font-size: 13px; color: var(--copper-light); margin-top: 3px; }

  .b-actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .action-btn {
    border: 1px solid var(--line); background: rgba(243,239,231,0.03);
    color: var(--text-soft); font-size: 12px; padding: 7px 12px; border-radius: 8px;
    cursor: pointer; font-family: var(--font-body); white-space: nowrap;
  }
  .action-btn:hover { border-color: var(--copper); color: var(--text); }
  .action-btn.came { color: var(--success); }
  .action-btn.no_show { color: var(--danger); }
  .action-btn.delete { color: var(--danger); }

  @media (max-width: 640px) {
    .booking-row { grid-template-columns: 1fr; text-align: left; }
    .b-time { text-align: left; }
    .b-actions { justify-content: flex-start; }
  }
</style>
</head>
<body>

<!-- ============ LOGIN SCREEN ============ -->
<div class="login-wrap" id="loginScreen">
  <div class="login-card">
    <h1>Адмін-панель</h1>
    <p class="sub">Tun-Tun-Tun Sahur</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="loginPassword" placeholder="••••••••" />
    </div>
    <button class="btn" id="loginBtn" onclick="handleLogin()">Увійти</button>
    <p class="login-msg" id="loginMsg"></p>
  </div>
</div>

<!-- ============ DASHBOARD ============ -->
<div class="container" id="dashboard" style="display:none;">
  <div class="dash-header">
    <h1>Записи</h1>
    <button class="logout-btn" onclick="handleLogout()">Вийти</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="upcoming" onclick="setFilter('upcoming')">Майбутні</button>
    <button class="filter-btn" data-filter="today" onclick="setFilter('today')">Сьогодні</button>
    <button class="filter-btn" data-filter="all" onclick="setFilter('all')">Всі</button>
  </div>

  <div id="bookingList" class="booking-list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL = "https://vsxjkesquejivthxxqip.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_AfHHxs19RkbGhEpflXzz8w_o31XTG99";
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { storageKey: "tuntuntun-admin-auth" }
  });

  const STATUS_LABELS = { booked: "Заплановано", came: "Прийшов", no_show: "Не прийшов", cancelled: "Скасовано" };
  let currentFilter = "upcoming";
  let allBookings = [];

  // ---------------- auth ----------------
  async function checkSession() {
    const { data } = await supabaseClient.auth.getSession();
    if (data.session) {
      showDashboard();
    } else {
      showLogin();
    }
  }

  function showLogin() {
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("dashboard").style.display = "none";
  }

  function showDashboard() {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadBookings();
  }

  async function handleLogin() {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    const msg = document.getElementById("loginMsg");
    const btn = document.getElementById("loginBtn");

    if (!email || !password) {
      msg.textContent = "Введіть email і пароль.";
      return;
    }

    btn.disabled = true;
    btn.textContent = "Вхід…";
    msg.textContent = "";

    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

    btn.disabled = false;
    btn.textContent = "Увійти";

    if (error) {
      msg.textContent = "Невірний email або пароль.";
      return;
    }
    showDashboard();
  }

  async function handleLogout() {
    await supabaseClient.auth.signOut();
    showLogin();
  }

  // ---------------- data ----------------
  async function loadBookings() {
    const list = document.getElementById("bookingList");
    list.innerHTML = `<p class="empty-note">Завантаження…</p>`;

    const { data, error } = await supabaseClient
      .from("bookings")
      .select("*")
      .order("booking_date", { ascending: true })
      .order("booking_time", { ascending: true });

    if (error) {
      list.innerHTML = `<p class="empty-note">Помилка завантаження: ${error.message}</p>`;
      console.error(error);
      return;
    }

    allBookings = data || [];
    renderBookings();
  }

  function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll(".filter-btn").forEach((b) => b.classList.toggle("active", b.dataset.filter === filter));
    renderBookings();
  }

  function renderBookings() {
    const list = document.getElementById("bookingList");
    const todayISO = new Date().toISOString().slice(0, 10);

    let filtered = allBookings;
    if (currentFilter === "upcoming") {
      filtered = allBookings.filter((b) => b.booking_date >= todayISO);
    } else if (currentFilter === "today") {
      filtered = allBookings.filter((b) => b.booking_date === todayISO);
    }

    if (filtered.length === 0) {
      list.innerHTML = `<p class="empty-note">Записів немає.</p>`;
      return;
    }

    list.innerHTML = filtered.map((b) => {
      const d = new Date(b.booking_date + "T00:00:00");
      const dateLabel = d.toLocaleDateString("uk-UA", { day: "numeric", month: "short" });
      return `
        <div class="booking-row status-${b.status}">
          <div class="b-time">
            ${b.booking_time.slice(0, 5)}
            <span class="date">${dateLabel}</span>
          </div>
          <div class="b-info">
            <div class="name">${escapeHtml(b.first_name)} ${escapeHtml(b.last_name)}</div>
            <div class="meta">${escapeHtml(b.service_name)} · ${escapeHtml(b.master_name)} · ${STATUS_LABELS[b.status] || b.status}</div>
            <div class="phone">${escapeHtml(b.phone)}</div>
          </div>
          <div class="b-actions">
            <button class="action-btn came" onclick="updateStatus('${b.id}', 'came')">Прийшов</button>
            <button class="action-btn no_show" onclick="updateStatus('${b.id}', 'no_show')">Не прийшов</button>
            <button class="action-btn delete" onclick="deleteBooking('${b.id}')">Видалити</button>
          </div>
        </div>
      `;
    }).join("");
  }

  async function updateStatus(id, status) {
    const { error } = await supabaseClient.from("bookings").update({ status }).eq("id", id);
    if (error) { alert("Помилка: " + error.message); return; }
    await loadBookings();
  }

  async function deleteBooking(id) {
    if (!confirm("Видалити цей запис назавжди?")) return;
    const { error } = await supabaseClient.from("bookings").delete().eq("id", id);
    if (error) { alert("Помилка: " + error.message); return; }
    await loadBookings();
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str ?? "";
    return div.innerHTML;
  }

  // enter key on login fields
  document.getElementById("loginPassword").addEventListener("keydown", (e) => {
    if (e.key === "Enter") handleLogin();
  });

  checkSession();
</script>

</body>
</html>
